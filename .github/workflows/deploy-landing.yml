name: Deploy Landing Page to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "landing-pg/**"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing-pg
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: landing-pg/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          GITHUB_PAGES: "true"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing-pg/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
