name: EAS Preview Build

on:
  workflow_dispatch: # Manual trigger only — requires EXPO_TOKEN + Firebase env vars as secrets

concurrency:
  group: eas-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview-build:
    name: EAS Preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build preview
        run: eas build --profile preview --platform all --non-interactive

      - name: Comment on PR with build link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'EAS Preview build started! Check the [Expo dashboard](https://expo.dev/accounts/fbablu/projects/niyah/builds) for build status.'
            })
